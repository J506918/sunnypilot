name: Generate Fonts

on:
  push:
    branches:
      - staging-zh
      - staging-C3XL
    paths:
      - 'selfdrive/ui/translations/*.po'
    paths-ignore:
      - 'selfdrive/assets/fonts/*.png'
      - 'selfdrive/assets/fonts/*.fnt'

jobs:
  generate_fonts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Python 3.12
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install pyray dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyray

      - name: Run font generation script
        run: |
          python selfdrive/assets/fonts/process.py

      - name: Commit and push generated font files
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add selfdrive/assets/fonts/*
          git commit -m 'Update generated font files' || echo 'No changes to commit'
          git push