name: Generate Fonts

on:
  push:
    branches:
      - staging-zh

jobs:
  generate_fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxi-dev libxrandr-dev libxinerama-dev libglu1-mesa-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cffi
          pip install --upgrade "pyray>=0.3.4"

      - name: Build Fonts
        run: |
          python selfdrive/assets/fonts/process.py

      - name: Commit and push generated font files
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add selfdrive/assets/fonts/*.fnt selfdrive/assets/fonts/*.png
          git commit -m 'Update generated font files' || echo 'No changes to commit'
          git push

