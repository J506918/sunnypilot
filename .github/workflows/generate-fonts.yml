name: Generate Fonts\n\non:\n  push:\n    branches:\n      - staging-zh\n      - staging-C3XL\n    paths:\n      - 'selfdrive/ui/translations/*.po'\n    paths-ignore:\n      - 'selfdrive/assets/fonts/*.png'\n      - 'selfdrive/assets/fonts/*.fnt'\n\njobs:\n  generate_fonts:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Setup Python 3.12\n        uses: actions/setup-python@v2\n        with:\n          python-version: '3.12'\n\n      - name: Install pyray dependency\n        run: |\n          python -m pip install --upgrade pip\n          pip install pyray\n\n      - name: Run font generation script\n        run: |\n          python selfdrive/assets/fonts/process.py\n\n      - name: Commit and push generated font files\n        run: |\n          git config --local user.email 'action@github.com'\n          git config --local user.name 'GitHub Action'\n          git add selfdrive/assets/fonts/*\n          git commit -m 'Update generated font files' || echo 'No changes to commit'\n          git push