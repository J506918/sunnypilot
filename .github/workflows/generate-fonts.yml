name: Generate Fonts

on:
  push:
    branches:
      - staging-zh
      - staging-C3XL
    paths:
      - 'selfdrive/ui/translations/*.po'

jobs:
  generate_fonts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 同时安装 pyray 和底层依赖 raylib，尝试解决 ffi 缺失问题
          pip install pyray raylib cffi

      - name: Run font generation script
        run: |
          # 运行脚本
          python selfdrive/assets/fonts/process.py

      - name: Commit and push generated font files
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add selfdrive/assets/fonts/*
          # [skip ci] 很重要，防止 Action 推送后再次触发自己导致死循环
          git commit -m 'Update generated font files [skip ci]' || echo 'No changes to commit'
          git push origin ${{ github.ref_name }}

