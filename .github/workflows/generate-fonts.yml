name: Font Generation Workflow\n\non: push:\n  branches:\n    - staging-zh\n    - staging-C3XL\n\njobs:\n  font_generation:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Setup Python 3.12\n        uses: actions/setup-python@v2\n        with:\n          python-version: '3.12'\n\n      - name: Install pyray dependency\n        run: |\n          python -m pip install --upgrade pip\n          pip install pyray\n\n      - name: Run font generation script\n        run: python selfdrive/assets/fonts/process.py\n\n      - name: Commit generated files\n        run: |\n          git config --local user.email 'action@github.com'\n          git config --local user.name 'GitHub Action'\n          git add selfdrive/assets/fonts/*.png selfdrive/assets/fonts/*.fnt\n          git commit -m 'Generated fonts' || echo 'No changes to commit'\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Push changes\n        run: git push origin HEAD:staging-zh\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n