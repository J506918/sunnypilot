name: 自动修正 sunnypilot_remote 仓库地址

on:
  schedule:
    - cron: '0 * * * *'  # 每小时自动运行一次
  workflow_dispatch:       # 也可以手动触发

jobs:
  fix-remote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Git 用户信息
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 扫描并修正所有分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: J506918
          REPO: sunnypilot
          TARGET_FILE: system/version.py
          CORRECT_REMOTE: github.com/J506918/sunnypilot
        run: |
          python3 - <<'EOF'
          import os
          import re
          import base64
          import requests

          TOKEN = os.environ["GH_TOKEN"]
          OWNER = os.environ["OWNER"]
          REPO = os.environ["REPO"]
          TARGET_FILE = os.environ["TARGET_FILE"]
          CORRECT_REMOTE = os.environ["CORRECT_REMOTE"]

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }
          BASE_URL = f"https://api.github.com/repos/{OWNER}/{REPO}"

          CORRECT_PROPERTY = f"""  @property
            def sunnypilot_remote(self) -> bool:
              return self.git_normalized_origin == "{CORRECT_REMOTE}""" 

          REMOTE_PATTERN = re.compile(
              r'(  @property\s+def sunnypilot_remote\(self\) -> bool:\s+return self\.git_normalized_origin.*?)(?=\n  @|\nclass |\Z)',
              re.DOTALL
          )

          def get_all_branches():
              branches = []
              page = 1
              while True:
                  resp = requests.get(f"{BASE_URL}/branches?per_page=100&page={page}", headers=HEADERS)
                  data = resp.json()
                  if not data:
                      break
                  branches.extend(b["name"] for b in data)
                  if len(data) < 100:
                      break
                  page += 1
              return branches

          def get_file(branch):
              resp = requests.get(f"{BASE_URL}/contents/{TARGET_FILE}?ref={branch}", headers=HEADERS)
              if resp.status_code == 404:
                  return None, None
              data = resp.json()
              content = base64.b64decode(data["content"]).decode("utf-8")
              return content, data["sha"]

          def needs_fix(content):
              match = REMOTE_PATTERN.search(content)
              if not match:
                  return False
              block = match.group(1)
              if f'== "{CORRECT_REMOTE}"' in block and "in (" not in block:
                  return False
              return True

          def fix_content(content):
              return REMOTE_PATTERN.sub(CORRECT_PROPERTY, content)

          def update_file(branch, content, sha):
              encoded = base64.b64encode(content.encode("utf-8")).decode("utf-8")
              payload = {
                  "message": f"fix: sunnypilot_remote 仅识别 {CORRECT_REMOTE}",
                  "content": encoded,
                  "sha": sha,
                  "branch": branch
              }
              resp = requests.put(f"{BASE_URL}/contents/{TARGET_FILE}", headers=HEADERS, json=payload)
              return resp.status_code in (200, 201)

          print(f"🔍 扫描仓库 {OWNER}/{REPO} 的所有分支...\n")
          branches = get_all_branches()
          print(f"共找到 {len(branches)} 个分支\n")

          for branch in branches:
              content, sha = get_file(branch)
              if content is None:
                  print(f"  [{branch}] ⚠️  未找到 {TARGET_FILE}，跳过")
                  continue
              if not needs_fix(content):
                  print(f"  [{branch}] ✅ 无需修改")
                  continue
              new_content = fix_content(content)
              success = update_file(branch, new_content, sha)
              if success:
                  print(f"  [{branch}] 🔧 已自动修复！")
              else:
                  print(f"  [{branch}] ❌ 修复失败")

          print("\n✅ 扫描完毕！")
          EOF
        